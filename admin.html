<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - School Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00334e; --secondary: #005a8d; --bg: #f4f7f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { display: flex; background: var(--bg); height: 100vh; }
        .sidebar { width: 260px; background: var(--primary); color: white; padding: 20px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #0d4a6b; padding-bottom: 10px; }
        .menu-item { padding: 15px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .menu-item:hover, .active { background: var(--secondary); }
        .main { flex: 1; overflow-y: auto; }
        .top-bar { background: var(--secondary); color: white; padding: 15px 30px; font-size: 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { font-size: 30px; margin-top: 10px; }
        .section { display: none; padding: 30px; }
        .active-section { display: block; }
        .form-box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; }
        table { width: 100%; background: white; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <div class="menu-item active" onclick="showTab('dash')">Dashboard</div>
        <div class="menu-item" onclick="showTab('ancholik')">Manage Ancholik</div>
        <div class="menu-item" onclick="showTab('madrasa')">Manage Madrasa</div>
    </div>

    <div class="main">
        <div class="top-bar">School Management System</div>

        <div id="dash" class="section active-section">
            <div class="dashboard-grid">
                <div class="card" style="border-top: 5px solid #27a9e3;">Total Students<h3 id="c-std">0</h3></div>
                <div class="card" style="border-top: 5px solid #28b779;">Total Ancholik<h3 id="c-anc">0</h3></div>
                <div class="card" style="border-top: 5px solid #ffb848;">Total Madrasa<h3 id="c-mad">0</h3></div>
            </div>
        </div>

        <div id="ancholik" class="section">
            <div class="form-box">
                <h3>Add Ancholik</h3>
                <input type="text" id="ancName" placeholder="Ancholik Name">
                <button onclick="saveAncholik()">Add Now</button>
            </div>
            <table>
                <thead><tr><th>Name</th><th>Action</th></tr></thead>
                <tbody id="ancList"></tbody>
            </table>
        </div>

        <div id="madrasa" class="section">
            <div class="form-box">
                <h3>Add Madrasa</h3>
                <select id="ancDropdown"><option>Select Ancholik</option></select>
                <input type="text" id="madName" placeholder="Madrasa Name">
                <button onclick="saveMadrasa()">Add Now</button>
            </div>
            <table>
                <thead><tr><th>Madrasa</th><th>Ancholik</th><th>Action</th></tr></thead>
                <tbody id="madList"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBMg5WVl6Mb5da_Ru_ArnCmxH7LWf-SXHw",
            authDomain: "pszdtb.firebaseapp.com",
            databaseURL: "https://pszdtb-default-rtdb.firebaseio.com",
            projectId: "pszdtb",
            storageBucket: "pszdtb.firebasestorage.app",
            messagingSenderId: "611250851516",
            appId: "1:611250851516:web:c313857f795f410096cab9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        // Save Ancholik
        function saveAncholik() {
            const name = document.getElementById('ancName').value;
            if(name) {
                db.ref('ancholiks').push({ name: name })
                .then(() => { document.getElementById('ancName').value = ""; })
                .catch(err => alert("Error: " + err.message));
            }
        }

        // Live Listeners
        db.ref('ancholiks').on('value', snap => {
            document.getElementById('c-anc').innerText = snap.numChildren() || 0;
            let rows = "", options = "";
            snap.forEach(child => {
                rows += `<tr><td>${child.val().name}</td><td><button onclick="db.ref('ancholiks/${child.key}').remove()">Delete</button></td></tr>`;
                options += `<option value="${child.key}">${child.val().name}</option>`;
            });
            document.getElementById('ancList').innerHTML = rows;
            document.getElementById('ancDropdown').innerHTML = options;
        });

        function saveMadrasa() {
            const mName = document.getElementById('madName').value;
            const aId = document.getElementById('ancDropdown').value;
            const aName = document.getElementById('ancDropdown').options[document.getElementById('ancDropdown').selectedIndex].text;
            if(mName && aId) {
                db.ref('madrasas').push({ name: mName, ancholikId: aId, ancholikName: aName });
                document.getElementById('madName').value = "";
            }
        }

        db.ref('madrasas').on('value', snap => {
            document.getElementById('c-mad').innerText = snap.numChildren() || 0;
            let rows = "";
            snap.forEach(child => {
                rows += `<tr><td>${child.val().name}</td><td>${child.val().ancholikName}</td><td><button onclick="db.ref('madrasas/${child.key}').remove()">Delete</button></td></tr>`;
            });
            document.getElementById('madList').innerHTML = rows;
        });
    </script>
</body>
</html>
