<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School MS - Step 1</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --sidebar-blue: #e0f2fe; 
            --accent: #0ea5e9; 
            --text: #0f172a;
            --white: #ffffff;
        }
        
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; background: #f8fafc; height: 100vh; color: var(--text); }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar-blue); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .logo { padding: 25px; font-size: 22px; font-weight: 800; color: var(--accent); text-align: center; border-bottom: 1px solid #cbd5e1; }
        .nav-item { padding: 15px 25px; cursor: pointer; font-weight: 500; transition: 0.3s; color: #475569; }
        .nav-item:hover { background: var(--white); color: var(--accent); }
        .nav-item.active { background: var(--white); color: var(--accent); border-left: 5px solid var(--accent); }

        /* Main Area */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; margin-bottom: 20px; }
        
        h2 { margin-top: 0; color: var(--text); font-size: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { background: #f8fafc; font-weight: 600; }
        .del-btn { color: #ef4444; cursor: pointer; border: none; background: none; font-weight: bold; }

        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">SCHOOL MS</div>
    <div class="nav-item active" onclick="showScreen('anch-screen', this)">🏢 Ancholik Master</div>
    <div class="nav-item" onclick="showScreen('madr-screen', this)">🕌 Maktab Master</div>
</div>

<div class="main">
    <div id="anch-screen" class="screen active">
        <div class="card">
            <h2>Add New Ancholik</h2>
            <input type="text" id="ancName" placeholder="Enter Ancholik Name (e.g. Zone A)">
            <button class="btn" onclick="addAncholik()">Save Ancholik</button>
        </div>

        <div class="card">
            <h2>Ancholik List</h2>
            <table id="ancTable">
                <thead><tr><th>Name</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="madr-screen" class="screen">
        <div class="card">
            <h2>Add New Maktab</h2>
            <select id="ancSelect">
                <option value="">Select Ancholik First</option>
            </select>
            <input type="text" id="madrName" placeholder="Enter Maktab Name">
            <button class="btn" onclick="addMaktab()">Save Maktab</button>
        </div>

        <div class="card">
            <h2>Maktab List</h2>
            <table id="madrTable">
                <thead><tr><th>Maktab Name</th><th>Ancholik</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBMg5WVl6Mb5da_Ru_ArnCmxH7LWf-SXHw",
        authDomain: "pszdtb.firebaseapp.com",
        databaseURL: "https://pszdtb-default-rtdb.firebaseio.com",
        projectId: "pszdtb",
        storageBucket: "pszdtb.firebasestorage.app",
        messagingSenderId: "611250851516",
        appId: "1:611250851516:web:c313857f795f410096cab9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Screen Switcher
    window.showScreen = function(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // 3. Ancholik Functions
    window.addAncholik = function() {
        const name = document.getElementById('ancName').value;
        if(!name) return alert("Pehle naam likhein!");
        
        db.ref('ancholiks').push({ name: name })
            .then(() => document.getElementById('ancName').value = "");
    }

    window.deleteAnc = function(id) {
        if(confirm("Delete karein?")) db.ref('ancholiks/' + id).remove();
    }

    // 4. Maktab Functions
    window.addMaktab = function() {
        const ancId = document.getElementById('ancSelect').value;
        const mName = document.getElementById('madrName').value;
        const ancName = document.getElementById('ancSelect').options[document.getElementById('ancSelect').selectedIndex].text;

        if(!ancId || !mName) return alert("Sab kuch bhariye!");

        db.ref('madrasas').push({
            name: mName,
            ancholikId: ancId,
            ancholikName: ancName
        }).then(() => document.getElementById('madrName').value = "");
    }

    window.deleteMadr = function(id) {
        if(confirm("Delete karein?")) db.ref('madrasas/' + id).remove();
    }

    // 5. Real-time Data Sync
    function syncData() {
        // Sync Ancholiks
        db.ref('ancholiks').on('value', snap => {
            let tableHtml = "";
            let selectHtml = '<option value="">Select Ancholik First</option>';
            
            snap.forEach(child => {
                const data = child.val();
                tableHtml += `<tr>
                    <td>${data.name}</td>
                    <td><button class="del-btn" onclick="deleteAnc('${child.key}')">DEL</button></td>
                </tr>`;
                selectHtml += `<option value="${child.key}">${data.name}</option>`;
            });
            
            document.querySelector('#ancTable tbody').innerHTML = tableHtml;
            document.getElementById('ancSelect').innerHTML = selectHtml;
        });

        // Sync Maktabs
        db.ref('madrasas').on('value', snap => {
            let tableHtml = "";
            snap.forEach(child => {
                const data = child.val();
                tableHtml += `<tr>
                    <td>${data.name}</td>
                    <td>${data.ancholikName}</td>
                    <td><button class="del-btn" onclick="deleteMadr('${child.key}')">DEL</button></td>
                </tr>`;
            });
            document.querySelector('#madrTable tbody').innerHTML = tableHtml;
        });
    }

    // Start Sync
    syncData();

</script>

</body>
</html>
